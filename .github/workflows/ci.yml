name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests + static checks
  # ---------------------------------------------------------------------------
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install only the packages needed for tests (no HF model downloads)
          pip install tiktoken pandas numpy scipy radon ruptures statsmodels \
                      sentence-transformers scikit-learn krippendorff \
                      python-dotenv pytest pytest-cov

      - name: Run unit tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

  # ---------------------------------------------------------------------------
  # Corpus build smoke test (no API keys required)
  # ---------------------------------------------------------------------------
  corpus-smoke:
    name: Corpus build smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install minimal deps
        run: pip install pandas numpy python-dotenv

      - name: Build corpus
        run: |
          cd src
          python corpus_builder.py

      - name: Verify output
        run: |
          python - <<'EOF'
          import pandas as pd
          df = pd.read_csv("data/extended_corpus.csv")
          assert len(df) == 200, f"Expected 200 rows, got {len(df)}"
          assert set(df.columns) >= {"id","semantic_form","domain","dot","camelCase","snake_case","kebab_case"}
          print(f"Corpus OK: {len(df)} identifiers.")
          EOF

  # ---------------------------------------------------------------------------
  # Figure generation smoke test (uses stub results CSVs)
  # ---------------------------------------------------------------------------
  plots-smoke:
    name: Plot generation smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install plot deps
        run: pip install pandas numpy matplotlib seaborn scipy python-dotenv

      - name: Run plot_results (gracefully skips empty results)
        run: |
          cd src
          python plot_results.py

      - name: Upload figure artefacts
        uses: actions/upload-artifact@v4
        with:
          name: figures
          path: results/plots/
          if-no-files-found: ignore
